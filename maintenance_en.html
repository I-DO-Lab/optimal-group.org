<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400, initial-scale=1.0, user-scalable=no">
    <title>Under Maintenance - OPTIMAL Group</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 60px 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .maintenance-message {
            font-size: 48px;
            font-weight: 700;
            color: #8a2be2;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .sub-message {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
        }

        .back-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(90deg, #8a2be2, #da70d6);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="maintenance-message">This page is under maintenance. Coming soon!</div>
        <div class="sub-message">我们正在维护此页面，请稍后再访问。</div>
        <a href="index.html" class="back-link">Back to Home</a>
    </div>
</body>
</html>
